<!DOCTYPE html>

    <meta charset="UTF-8">
    <title>Formules mathématiques</title>

<body>

<h2>Quelques formules mathématiques :</h2>

<p>(x<sub>1</sub> + x<sub>2</sub>)<sup>2</sup> = x<sub>1</sub><sup>2</sup> + x<sub>2</sub><sup>2</sup> + 2x<sub>1</sub>x<sub>2</sub></p>

<p>(x<sub>1</sub> - x<sub>2</sub>)<sup>2</sup> = x<sub>1</sub><sup>2</sup> + x<sub>2</sub><sup>2</sup> - 2x<sub>1</sub>x<sub>2</sub></p>

<p>(x<sub>1</sub> - x<sub>2</sub>)<sup>2</sup> = (x<sub>1</sub> + x<sub>2</sub>)<sup>2</sup> - 4x<sub>1</sub>x<sub>2</sub></p>

</body>
</html>
